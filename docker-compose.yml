services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://social_media_user:social_media_password@db:5432/social_media_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social_network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=social_media_user
      - POSTGRES_PASSWORD=social_media_password
      - POSTGRES_DB=social_media_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_media_user -d social_media_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

networks:
  social_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
